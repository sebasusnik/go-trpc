version: "2"

run:
  timeout: 5m

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign

  settings:
    staticcheck:
      checks:
        - "all"
        - "-QF*"
        - "-ST*"
        - "-SA1019"

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
    paths:
      - examples
