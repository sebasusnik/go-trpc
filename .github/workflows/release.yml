name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build binaries
        run: |
          GOOS=linux GOARCH=amd64 go build -o gotrpc-linux-amd64 ./cmd/gotrpc
          GOOS=darwin GOARCH=amd64 go build -o gotrpc-darwin-amd64 ./cmd/gotrpc
          GOOS=darwin GOARCH=arm64 go build -o gotrpc-darwin-arm64 ./cmd/gotrpc

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            gotrpc-linux-amd64
            gotrpc-darwin-amd64
            gotrpc-darwin-arm64
